user                            nginx; # 왜 유저이름이 필요한가?
worker_processes                auto; # it will be determinate automatically by the number of core

error_log                       /var/log/nginx/error.log warn;
#pid                             /var/run/nginx/nginx.pid; # it permit you to use rc-service nginx reload|restart|stop|start

events {
    worker_connections          1024;
}

http {
    include                     /etc/nginx/mime.types;
    default_type                application/octet-stream;
    sendfile                    on;
    access_log                  /var/log/nginx/access.log;
    keepalive_timeout           3000;
    server {
        listen                 443; #nginx가 443번포트에서 통신하도록 설정
        root                    /wordpress; #해당 컨테이너에서 찾을 파일이 저장된 경로로 wordpress와 바인드마운트되어야한다
        index                   index.html index.htm index.php; #해당 경로에서 찾을 기본파일의 이름
        server_name             hgu.42.fr; #
        client_max_body_size    32m;
        error_page              500 502 503 504  /50x.html;
        location / {
            root                /wordpress
            #try_files $uri $uri/ =404;
        }
        location = /50x.html {
              root              /var/lib/nginx/html; #error의 경우 탐색폴더를 새로 지정
        }

        #php파일처리
        location ~ \.php$ {
            include snippets/fastcgi-php.conf; #FastCGI설정

            #FastCGI 파라미터 설정
            fastcgi_param SCRIPT_FILENAME /wordpress/$fastcgi_script_name;
            fastcgi_pass wordpress:9000 #PHP-FPM서버 주소 및 포트
        }
    }
    include /etc/nginx/conf.d/*.conf; #추가 설정 파일 포함
}