version: '1.0'

services: #여기에 사용할 컨테이너(어플리케이션)을 정의
  mariadb:
    build: ./mariadb #mariadb폴더속 dockerfile로 이미지빌드
    container_name: mariadb
    volumes:
      - /home/hgu/data/DB:/var/lib/mysql #여기만 bind하면 되나?
    networks:
      - wordpress_net
    ports: #포트를 외부에 노출해야하나? 굳이?
      - "3306:3306"
    expose:
      - "3306"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --silent || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    volumes:
      - /home/hgu/data/WordPress:/path_of_wordpress #TODO
    networks:
      - wordpress_net
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: example_password
      WORDPRESS_DB_NAME: wordpress
    depends_on:
      - mariadb

  nginx:
    image: nginx:latest
    container_name: nginx
    networks:
      - default
      - wordpress_net
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - wordpress

networks:
  wordpress_net:
    driver: bridge


